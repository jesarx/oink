{{define "content"}}
<div class="login">
  <svg class="pig" viewBox="0 0 100 100" aria-hidden="true">
    <path d="M22 32 L14 18 L30 24" fill="none" stroke="#E06A93" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M78 32 L86 18 L70 24" fill="none" stroke="#E06A93" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="50" cy="54" r="32" fill="none" stroke="#E06A93" stroke-width="4"/>
    <ellipse cx="50" cy="56" rx="13" ry="9.5" fill="none" stroke="#E06A93" stroke-width="4"/>
    <circle cx="45" cy="56" r="2.4" fill="#E06A93"/><circle cx="55" cy="56" r="2.4" fill="#E06A93"/>
    <circle cx="37" cy="42" r="2.4" fill="#E06A93"/><circle cx="63" cy="42" r="2.4" fill="#E06A93"/>
  </svg>
  <h1>oink</h1>
  {{if .Error}}<p class="err">{{.Error}}</p>{{end}}
  <form method="post" action="/login">
    <input type="password" name="password" placeholder="Contraseña" autofocus autocomplete="current-password" required>
    <button type="submit" class="btn primary">Entrar</button>
  </form>
</div>
{{end}}
