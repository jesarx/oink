{{define "content"}}
<h1>Editar movimiento</h1>
<p class="muted">{{kindLabel .T.Kind .T.Credit}}{{if .T.TplName.Valid}} · {{.T.TplName.String}}{{end}}</p>
<form method="post" action="/tx/{{.T.ID}}" class="edit stack">
  <label>Monto
    <input type="text" name="amount" inputmode="decimal" value="{{.Amount}}" required>
  </label>
  <label>Concepto
    <input type="text" name="concept" value="{{.T.Concept}}" maxlength="80" placeholder="(opcional)">
  </label>
  <label>Fecha
    <input type="date" name="made_on" value="{{.Date}}" required>
  </label>
  {{if eq .T.Kind "income"}}
  <label>Llegó
    <select name="via">
      <option value="banco" {{if not .T.Cash}}selected{{end}}>Al banco / tarjeta</option>
      <option value="efectivo" {{if .T.Cash}}selected{{end}}>En efectivo (va al sobre)</option>
    </select>
  </label>
  {{end}}
  {{if or (eq .T.Kind "card") (eq .T.Kind "cash")}}
  <label>Fuente
    <select name="source">
      <option value="debit" {{if and (eq .T.Kind "card") (not .T.Credit)}}selected{{end}}>T. Débito</option>
      <option value="credit" {{if and (eq .T.Kind "card") .T.Credit}}selected{{end}}>T. Crédito</option>
      <option value="cash" {{if eq .T.Kind "cash"}}selected{{end}}>Efectivo</option>
    </select>
  </label>
  <label>Rubro
    <select name="category">
      <option value="">Sin rubro</option>
      {{range .Categories}}<option value="{{.Key}}" {{if eq .Key $.T.Category}}selected{{end}}>{{.Label}}</option>{{end}}
    </select>
  </label>
  {{end}}
  <button class="btn primary">Guardar cambios</button>
</form>
<form method="post" action="/tx/{{.T.ID}}/delete">
  <button class="btn danger" data-confirm="¿Borrar este movimiento?">Borrar movimiento</button>
</form>
<p><a class="muted" href="/mes">‹ Volver al mes</a></p>
{{end}}
