<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#121216">
<meta name="color-scheme" content="dark">
<title>oink</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<link rel="stylesheet" href="/static/style.css?v={{v}}">
</head>
<body>
<div id="syncbar" hidden></div>
<main>
{{template "content" .}}
</main>
{{if .Nav}}
<nav class="tabs">
  <a href="/" class="{{if eq .Nav "home"}}on{{end}}"><span class="ico">◉</span>Hoy</a>
  <a href="/entradas" class="{{if eq .Nav "entradas"}}on{{end}}"><span class="ico">↓</span>Entradas</a>
  <a href="/pendientes" class="{{if eq .Nav "pendientes"}}on{{end}}"><span class="ico">✓</span>Pendientes</a>
  <a href="/reportes" class="{{if eq .Nav "reportes"}}on{{end}}"><span class="ico">▦</span>Reportes</a>
  <a href="/prestamos" class="{{if eq .Nav "prestamos"}}on{{end}}"><span class="ico">⇄</span>Préstamos</a>
  <a href="/ajustes" class="{{if eq .Nav "ajustes"}}on{{end}}"><span class="ico">⚙</span>Ajustes</a>
</nav>
{{end}}
<script src="/static/app.js?v={{v}}"></script>
</body>
</html>
